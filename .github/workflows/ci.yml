name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests with coverage
        # The fast suite (-m 'not slow', from pyproject addopts) needs no
        # live Postgres -- DB/large-ontology tests are @slow or self-skip.
        # Coverage is printed to the CI log only; not published anywhere.
        run: uv run pytest --cov --cov-report=term-missing
