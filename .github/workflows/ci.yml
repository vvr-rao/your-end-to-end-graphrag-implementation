name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      # Run every Python version even if one fails, so the matrix reports
      # exactly which versions pass.
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev --python ${{ matrix.python-version }}

      - name: Run tests with coverage
        # The fast suite (-m 'not slow', from pyproject addopts) needs no
        # live Postgres -- DB/large-ontology tests are @slow or self-skip.
        # Coverage is printed to the CI log only; not published anywhere.
        run: uv run --python ${{ matrix.python-version }} pytest --cov --cov-report=term-missing
