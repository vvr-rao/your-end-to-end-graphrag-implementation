# =============================================================================
# models.openai.example.yaml  —  OPENAI-ONLY PRESET
#
# A drop-in `models.yaml` that runs EVERY task on OpenAI. Use this if you don't
# have (or don't want) a Groq key.
#   cp config/models.openai.example.yaml config/models.yaml
#
# Difference from the default preset (config/models.example.yaml): the single
# Groq task, chunk_classification, is repointed to OpenAI gpt-4o-mini. Embeddings
# already run on OpenAI in every mode. GROQ_API_KEY is NOT needed with this file.
# =============================================================================

tasks:
  # OpenAI Stage-1 classifier. Notes:
  #  - gpt-4o-mini is the cheap default and fine for SMALL/MEDIUM ontologies.
  #  - It needs a longer timeout + lower concurrency
  #    (expansion.max_concurrent_llm_calls: 3-4 in config.yaml) or it times out.
  #  - On LARGE, FLAT ontologies (e.g. pharma DRON/HP, ~256 top-level branches)
  #    gpt-4o-mini ignores the "<=50 IRIs" rule and dumps 200-400+ IRIs: the JSON
  #    truncates ("salvaged N IRIs") AND the downstream hard-cap then keeps an
  #    ARBITRARY 50, degrading Stage 2. For those corpora switch to gpt-4.1
  #    (better instruction-following, 32k output ceiling) — it's one call per
  #    source chunk so the cost is modest:
  #      model: gpt-4.1
  #      max_tokens: 16384
  # json_object mode is safe here (the prompt already requests JSON).
  chunk_classification:
    provider: openai
    model: gpt-4.1-mini
    timeout: 180
    temperature: 0.0
    max_tokens: 8192
    response_format: json_object

  class_proposal:
    provider: openai
    model: gpt-4.1
    timeout: 180
    temperature: 0.0
    max_tokens: 32768
    response_format: json_object

  match_dedup:
    provider: openai
    model: gpt-4.1
    timeout: 120
    temperature: 0.0
    max_tokens: 4096
    response_format: json_object

  concept_grouping:
    provider: openai
    model: gpt-4.1
    timeout: 240
    temperature: 0.0
    max_tokens: 8192
    response_format: json_object

  compact_description:
    provider: openai
    model: gpt-4o-mini
    timeout: 60
    temperature: 0.0
    max_tokens: 2048
    response_format: json_object

  # RECOMMENDATION: use gpt-4.1 for summarization, not gpt-4o-mini. Mini ignores
  # the "preserve entities/lists/numbers, keep 20-50%" instructions and
  # over-compresses to ~5% of the source, which starves downstream entity/
  # artifact extraction. gpt-4.1 follows them -> fuller, more faithful summaries.
  # Combined with segment-wise summarization (docs >4k tokens are split; see
  # pipeline_llm), a large doc gets several proportional summaries near the 20%
  # floor. Cost is one-time + cached (~$2 for a ~500k-token corpus).
  #   model: gpt-4.1  ;  max_tokens: 8192  ;  timeout: 180
  document_summarize:
    provider: openai
    model: gpt-4.1
    timeout: 180
    temperature: 0.0
    max_tokens: 8192

  # Evaluated (near-lossless) document summarizer -- new default ingestion path
  # (summarize -> question-gen -> evaluate -> revise). OpenAI-only preset: gpt-4.1.
  evaluated_summary_chunk:
    provider: openai
    model: gpt-4.1-mini
    timeout: 180
    temperature: 0.0
    max_tokens: 8192
  summary_question_gen:
    provider: openai
    model: gpt-4.1-mini
    timeout: 120
    temperature: 0.0
    max_tokens: 4096
    response_format: json_object
  summary_evaluate:
    provider: openai
    model: gpt-4.1-mini
    timeout: 120
    temperature: 0.0
    max_tokens: 4096
    response_format: json_object
  summary_revise:
    provider: openai
    model: gpt-4.1-mini
    timeout: 180
    temperature: 0.0
    max_tokens: 8192

  classification_audit:
    provider: openai
    model: gpt-4o-mini
    timeout: 90
    temperature: 0.0
    max_tokens: 4096
    response_format: json_object

  class_summarization:
    provider: openai
    model: gpt-4o-mini
    timeout: 60
    temperature: 0.2
    max_tokens: 1024

  qa_synthesis:
    provider: openai
    model: gpt-4.1
    timeout: 180
    temperature: 0.1
    max_tokens: 4096

  embeddings:
    provider: openai
    model: text-embedding-3-small
    dim: 1024
    batch_size: 100

  artifact_chunk_extract:
    provider: openai
    model: gpt-4o-mini
    timeout: 60
    temperature: 0.0
    max_tokens: 8192          # entity-grounded artifact JSON on dense chunks exceeds 2048 -> truncation
    response_format: json_object

  artifact_chunk_extract_with_entities:
    provider: openai
    model: gpt-4o-mini
    timeout: 60
    temperature: 0.0
    max_tokens: 8192          # entity-grounded artifact JSON on dense chunks exceeds 2048 -> truncation
    response_format: json_object

  entity_extract:
    provider: openai
    model: gpt-4o-mini
    timeout: 60
    temperature: 0.0
    max_tokens: 8192          # dense chunks w/ many entities (50 candidate classes) exceed 2048 -> truncation
    response_format: json_object

  question_parse:
    provider: openai
    model: gpt-4o-mini
    timeout: 30
    temperature: 0.0
    max_tokens: 1024
    response_format: json_object

  concept_expansion:
    provider: openai
    model: gpt-4o-mini
    timeout: 30
    temperature: 0.0
    max_tokens: 1024
    response_format: json_object

  query_decompose:
    provider: openai
    model: gpt-4o-mini
    timeout: 30
    temperature: 0.0
    max_tokens: 1024
    response_format: json_object

  entity_probes:
    provider: openai
    model: gpt-4o-mini
    timeout: 30
    temperature: 0.0
    max_tokens: 1024
    response_format: json_object

  chunk_relevance_filter:
    provider: openai
    model: gpt-4o-mini
    timeout: 60
    temperature: 0.0
    max_tokens: 4096
    response_format: json_object

  answer_simple_qa:
    provider: openai
    model: gpt-4o-mini
    timeout: 60
    temperature: 0.0
    max_tokens: 1024

  answer_deep_research:
    provider: openai
    model: gpt-4.1
    timeout: 180
    temperature: 0.1
    max_tokens: 8192          # 7-section deep_research answers over evidence-rich corpora exceed 4096

  follow_up_resolution:
    provider: openai
    model: gpt-4o-mini
    timeout: 30
    temperature: 0.0
    max_tokens: 512

  answer_conversation_turn:
    provider: openai
    model: gpt-4o-mini
    timeout: 90
    temperature: 0.1
    max_tokens: 2048

  insight_gen:
    provider: openai
    model: gpt-4.1
    timeout: 120
    temperature: 0.2
    max_tokens: 2048
    response_format: json_object

  recommendation_gen:
    provider: openai
    model: gpt-4.1
    timeout: 120
    temperature: 0.2
    max_tokens: 2048
    response_format: json_object

  # Artifact rollup (clustered merge) + lossless evaluate->revise loop.
  artifact_merge:
    provider: openai
    model: gpt-4.1
    timeout: 180
    temperature: 0.2
    max_tokens: 8192
    response_format: json_object
  artifact_merge_evaluate:
    provider: openai
    model: gpt-4.1
    timeout: 120
    temperature: 0.0
    max_tokens: 4096
    response_format: json_object
  artifact_merge_revise:
    provider: openai
    model: gpt-4.1
    timeout: 180
    temperature: 0.2
    max_tokens: 8192
    response_format: json_object

  # Summary rollup uses a MORE CAPABLE model than the short-artifact merge:
  # gpt-5.4 gives measurably higher retention on the 9-section Summary,
  # while Claim/Finding/Observation/Event merges are handled perfectly by
  # the cheaper artifact_merge* (gpt-4.1) -- so no premium is paid there.
  summary_merge:
    provider: openai
    model: gpt-5.4
    timeout: 180
    temperature: 0.2
    max_tokens: 16384
    response_format: json_object
  summary_merge_evaluate:
    provider: openai
    model: gpt-5.4
    timeout: 120
    temperature: 0.0
    max_tokens: 8192
    response_format: json_object
  summary_merge_revise:
    provider: openai
    model: gpt-5.4
    timeout: 180
    temperature: 0.2
    max_tokens: 16384
    response_format: json_object
  judge_comprehensiveness:
    provider: openai
    model: gpt-4.1
    timeout: 60
    temperature: 0.0
    max_tokens: 1024
    response_format: json_object

  judge_no_hallucination:
    provider: openai
    model: gpt-4.1
    timeout: 60
    temperature: 0.0
    max_tokens: 1024
    response_format: json_object

  judge_gap_detection:
    provider: openai
    model: gpt-4.1
    timeout: 60
    temperature: 0.0
    max_tokens: 1024
    response_format: json_object

  judge_consistency:
    provider: openai
    model: gpt-4.1
    timeout: 60
    temperature: 0.0
    max_tokens: 2048
    response_format: json_object

  artifact_document_summary:
    provider: openai
    model: gpt-4o-mini
    timeout: 90
    temperature: 0.2
    max_tokens: 1024

  table_extract_vision:
    provider: openai
    model: gpt-4o-mini
    timeout: 90
    temperature: 0.0
    max_tokens: 4096
    response_format: json_object

  table_concept_grouping:
    provider: openai
    model: gpt-4o-mini
    timeout: 60
    temperature: 0.0
    max_tokens: 2048
    response_format: json_object

defaults:
  retries:
    max_attempts: 5
    initial_wait_seconds: 1
    max_wait_seconds: 30
    retry_on_status: [429, 500, 502, 503, 504]
