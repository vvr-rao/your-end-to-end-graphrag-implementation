# =============================================================================
# models.openai.example.yaml  —  OPENAI-ONLY PRESET
#
# A drop-in `models.yaml` that runs EVERY task on OpenAI. Use this if you don't
# have (or don't want) a Groq key.
#   cp config/models.openai.example.yaml config/models.yaml
#
# Difference from the default preset (config/models.example.yaml): the single
# Groq task, chunk_classification, is repointed to OpenAI gpt-4o-mini. Embeddings
# already run on OpenAI in every mode. GROQ_API_KEY is NOT needed with this file.
# =============================================================================

tasks:
  # Repointed from Groq → OpenAI. gpt-4o-mini's output ceiling is 16k (not 32k);
  # for very broad-coverage corpora bump to gpt-4.1 (32k ceiling, ~16x cost).
  chunk_classification:
    provider: openai
    model: gpt-4o-mini
    timeout: 60
    temperature: 0.0
    max_tokens: 16384

  class_proposal:
    provider: openai
    model: gpt-4.1
    timeout: 180
    temperature: 0.0
    max_tokens: 32768
    response_format: json_object

  match_dedup:
    provider: openai
    model: gpt-4.1
    timeout: 120
    temperature: 0.0
    max_tokens: 4096
    response_format: json_object

  concept_grouping:
    provider: openai
    model: gpt-4.1
    timeout: 240
    temperature: 0.0
    max_tokens: 8192
    response_format: json_object

  compact_description:
    provider: openai
    model: gpt-4o-mini
    timeout: 60
    temperature: 0.0
    max_tokens: 2048
    response_format: json_object

  document_summarize:
    provider: openai
    model: gpt-4o-mini
    timeout: 120
    temperature: 0.0
    max_tokens: 4096

  classification_audit:
    provider: openai
    model: gpt-4o-mini
    timeout: 90
    temperature: 0.0
    max_tokens: 4096
    response_format: json_object

  class_summarization:
