# =============================================================================
# models.example.yaml
#
# Copy to models.yaml and edit. models.yaml is gitignored.
#   cp config/models.example.yaml config/models.yaml
#
# Maps each LLM task to a provider + model + runtime params. Consumed by
# backend/app/services/llm_router.py. Provider-agnostic interface — swap models
# here without touching service code.
#
# Providers in use: OpenAI (most tasks) + Groq (document-ingestion tagging only).
# =============================================================================

tasks:
  # ---------------------------------------------------------------------------
  # Cheap, high-volume classification: tag each doc chunk against the existing
  # ontology's class list. Groq's 70B Llama runs at <1s/call and is ~10× cheaper
  # than GPT-4-class for this volume of work.
  #
  # SWITCHING THIS TASK TO OPENAI (gpt-4o-mini)? It's slower than Groq, so also:
  #   - raise `timeout` here to ~180 (60 is fine for Groq, too tight for mini),
  #   - lower expansion.max_concurrent_llm_calls in config.yaml to 3-4 (8
  #     concurrent large requests on mini throttle and time out),
  #   - drop max_tokens to ~4096 (output is <=50 IRIs) and add
  #     `response_format: json_object`.
  # See config/models.openai.example.yaml for a ready-made OpenAI-only preset,
  # and config/config.example.yaml for the per-provider concurrency guidance.
  # Trade-off: Groq = faster + cheaper for this step; OpenAI = single-vendor.
  # ---------------------------------------------------------------------------
  chunk_classification:
    provider: groq
    model: llama-3.3-70b-versatile
    timeout: 60
    temperature: 0.0
    # Groq llama-3.3-70b supports up to 32k output tokens. 32k is the
    # model's hard ceiling and accommodates broad-coverage chunks
    # without truncating the relevant_iris list mid-string.
    max_tokens: 32768

  # ---------------------------------------------------------------------------
  # The hard step: looking at a slice of ontology classes + a doc chunk and
  # producing structured "MATCHES FOUND" / "MATCH NOT FOUND" JSON.
  # ---------------------------------------------------------------------------
  class_proposal:
    provider: openai
    model: gpt-4.1
    timeout: 180
    temperature: 0.0
    # gpt-4.1 supports up to 32k output tokens. 32k = ceiling; the model
    # only emits the tokens it needs so cost scales with actual response
    # size. At 8192 the JSON response truncated on rich chunks.
    max_tokens: 32768
    response_format: json_object

  # ---------------------------------------------------------------------------
  # Dedup pass: collapse multiple LLM outputs proposing the same class with
  # slightly different labels. Structured-output reliability matters here.
  # ---------------------------------------------------------------------------
  match_dedup:
    provider: openai
    model: gpt-4.1
    timeout: 120
    temperature: 0.0
    max_tokens: 4096
    response_format: json_object

  # ---------------------------------------------------------------------------
  # Layer G: top-level concept grouping. ONE call per prune-expand. Takes the
  # orphan-class list (parent=owl:Thing in the synthesized namespace) and
  # proposes 5-15 high-level concept classes to group them under, plus an
  # assignment per orphan. Needs strong reasoning over a large label list.
  # ---------------------------------------------------------------------------
  concept_grouping:
    provider: openai
    model: gpt-4.1
    timeout: 240
    temperature: 0.0
    max_tokens: 8192
    response_format: json_object

  # ---------------------------------------------------------------------------
  # One-time class-metadata compression. Run once after merge to compress each
  # class's descriptions+comments into a single <=15-word `compact_description`
  # stored on the class record. Cuts Stage 2's per-class slice footprint by
  # ~50%. gpt-4o-mini is the cost sweet spot (16x cheaper than gpt-4.1) and
  # plenty strong for "rewrite this in <=15 words". JSON-mode for reliability.
  # ---------------------------------------------------------------------------
  compact_description:
    provider: openai
    model: gpt-4o-mini
    timeout: 60
    temperature: 0.0
    max_tokens: 2048
    response_format: json_object

  # ---------------------------------------------------------------------------
  # Pre-pipeline document summarization. Documents above the configured token
  # threshold (chunking.summarization_threshold_tokens in config.yaml) get
  # rewritten via gpt-4o-mini into a denser entity-preserving summary BEFORE
  # chunking. Cuts Stage 2 chunk count + cost dramatically on corpora with a
  # few large documents. Plain-text response (NOT json) -- the chunker
  # consumes prose directly.
  # ---------------------------------------------------------------------------
  document_summarize:
    provider: openai
    model: gpt-4o-mini
    timeout: 120
    temperature: 0.0
    max_tokens: 4096

  # ---------------------------------------------------------------------------
  # Evaluated (near-lossless) document summarizer -- the new DEFAULT ingestion
  # summarizer (config summarization.method=evaluated; set to single_pass to use
  # document_summarize above instead). Per source chunk it runs
  # summarize -> question-gen -> evaluate -> revise (config eval_rounds, default 3),
  # then a deterministic section-coverage check. Much higher fidelity, ~6-9 calls
  # per chunk -- smoke-test with --limit before a full corpus run.
  #
  # gpt-4.1 for strict instruction-following. Groq equivalent for ALL FOUR tasks
  # is llama-3.3-70b-versatile (cheaper; already integrated). A mixed/groq preset
  # would set `provider: groq` / `model: llama-3.3-70b-versatile` on each.
  # Embeddings stay on OpenAI in every mode.
  # ---------------------------------------------------------------------------
  evaluated_summary_chunk:
    provider: openai
    model: gpt-4.1-mini              # groq: llama-3.3-70b-versatile
    timeout: 180
    temperature: 0.0
    max_tokens: 8192
  summary_question_gen:
    provider: openai
    model: gpt-4.1-mini              # groq: llama-3.3-70b-versatile
    timeout: 120
    temperature: 0.0
    max_tokens: 4096
    response_format: json_object
  summary_evaluate:
    provider: openai
    model: gpt-4.1-mini              # groq: llama-3.3-70b-versatile
    timeout: 120
    temperature: 0.0
    max_tokens: 4096
    response_format: json_object
  summary_revise:
    provider: openai
    model: gpt-4.1-mini              # groq: llama-3.3-70b-versatile
    timeout: 180
    temperature: 0.0
    max_tokens: 8192

  # ---------------------------------------------------------------------------
  # Layer H (classification audit): post-Stage-4 misclassification pass.
  # Reviews newly-created classes whose current parent is "suspicious" and
  # returns KEEP / RE_HOME / CONVERT_TO_INSTANCE decisions.
  # ---------------------------------------------------------------------------
  classification_audit:
    provider: openai
    model: gpt-4o-mini
    timeout: 90
    temperature: 0.0
    max_tokens: 4096
    response_format: json_object

  # ---------------------------------------------------------------------------
  # Class-level summarization (Phase 2). Cheap, fast, plenty strong.
  # ---------------------------------------------------------------------------
  class_summarization:
    provider: openai
    model: gpt-4o-mini
    timeout: 60
    temperature: 0.2
    max_tokens: 1024

  # ---------------------------------------------------------------------------
  # QA answer synthesis (Phase 2). Highest reasoning task — gets the strongest
  # model. Low temperature for citation faithfulness.
  # ---------------------------------------------------------------------------
  qa_synthesis:
    provider: openai
    model: gpt-4.1
    timeout: 180
    temperature: 0.1
    max_tokens: 4096

  # ---------------------------------------------------------------------------
  # Embeddings — used for chunk_embeddings + class summary embeddings.
  # Phase 2 uses 1024 dim (33% storage saving vs default 1536, negligible
  # retrieval-quality cost). Schema's `model` column lets us re-embed later.
  # ---------------------------------------------------------------------------
  embeddings:
    provider: openai
    model: text-embedding-3-small
    dim: 1024
    batch_size: 100

  # ---------------------------------------------------------------------------
  # Phase 2 Milestone E: per-chunk Claim+Finding+Observation extraction.
  # One LLM call returns all three types per chunk (3× cheaper than splitting).
  # gpt-4o-mini is plenty for structured extraction; high volume = cost matters.
  # ---------------------------------------------------------------------------
  artifact_chunk_extract:
    provider: openai
    model: gpt-4o-mini
    timeout: 60
    temperature: 0.0
    max_tokens: 8192          # entity-grounded artifact JSON on dense chunks exceeds 2048 -> truncation
    response_format: json_object

  # Same config as artifact_chunk_extract -- just a different prompt
  # (entity-grounded). Separate task so cost tracking can distinguish
  # generic vs entity-grounded extraction runs.
  artifact_chunk_extract_with_entities:
    provider: openai
    model: gpt-4o-mini
    timeout: 60
    temperature: 0.0
    max_tokens: 8192          # entity-grounded artifact JSON on dense chunks exceeds 2048 -> truncation
    response_format: json_object

  # Milestone C: per-chunk named-entity extraction. JSON mode for
  # reliability; bounded output since each chunk yields <= 15 entities.
  entity_extract:
    provider: openai
    model: gpt-4o-mini
    timeout: 60
    temperature: 0.0
    max_tokens: 8192          # dense chunks w/ many entities (50 candidate classes) exceed 2048 -> truncation
    response_format: json_object

  # =================== Milestone F: retrieval pipeline ===================
  question_parse:
    provider: openai
    model: gpt-4o-mini
    timeout: 30
    temperature: 0.0
    max_tokens: 1024
    response_format: json_object

  concept_expansion:
    provider: openai
    model: gpt-4o-mini
    timeout: 30
    temperature: 0.0
    max_tokens: 1024
    response_format: json_object

  query_decompose:
    provider: openai
    model: gpt-4o-mini
    timeout: 30
    temperature: 0.0
    max_tokens: 1024
    response_format: json_object

  # Per-entity probe fan-out for comparison/enumeration queries (one focused
  # probe per entity). Cheap templating -> gpt-4o-mini (groq: llama-3.3-70b).
  entity_probes:
    provider: openai
    model: gpt-4o-mini
    timeout: 30
    temperature: 0.0
    max_tokens: 1024
    response_format: json_object

  chunk_relevance_filter:
    provider: openai
    model: gpt-4o-mini
    timeout: 60
    temperature: 0.0
    max_tokens: 4096
    response_format: json_object

  # simple_qa: tight 1-3 sentence direct answer.
  answer_simple_qa:
    provider: openai
    model: gpt-4o-mini
    timeout: 60
    temperature: 0.0
    max_tokens: 1024

  # deep_research: structured 6-section output. Default mode.
  answer_deep_research:
    provider: openai
    model: gpt-4.1
    timeout: 180
    temperature: 0.1
    max_tokens: 8192          # 7-section deep_research answers over evidence-rich corpora exceed 4096

  # =================== Milestone G: conversation ===================
  follow_up_resolution:
    provider: openai
    model: gpt-4o-mini
    timeout: 30
    temperature: 0.0
    max_tokens: 512

  answer_conversation_turn:
    provider: openai
    model: gpt-4o-mini
    timeout: 90
    temperature: 0.1
    max_tokens: 2048

  # =================== Insight + Recommendation generation ===================
  insight_gen:
    provider: openai
    model: gpt-4.1
    timeout: 120
    temperature: 0.2
    max_tokens: 2048
    response_format: json_object

  recommendation_gen:
    provider: openai
    model: gpt-4.1
    timeout: 120
    temperature: 0.2
    max_tokens: 2048
    response_format: json_object

  # =================== Eval framework: LLM-as-judge ===================
  judge_comprehensiveness:
    provider: openai
    model: gpt-4.1
    timeout: 60
    temperature: 0.0
    max_tokens: 1024
    response_format: json_object

  judge_no_hallucination:
    provider: openai
    model: gpt-4.1
    timeout: 60
    temperature: 0.0
    max_tokens: 1024
    response_format: json_object

  judge_gap_detection:
    provider: openai
    model: gpt-4.1
    timeout: 60
    temperature: 0.0
    max_tokens: 1024
    response_format: json_object

  judge_consistency:
    provider: openai
    model: gpt-4.1
    timeout: 60
    temperature: 0.0
    max_tokens: 2048
    response_format: json_object

  # ---------------------------------------------------------------------------
  # Phase 2 Milestone E: per-document Summary artifact. Plain-text output.
  # v2 (2026-07-05) is preservation-focused (keeps every entity / complete list
  # / number / regulatory + safety detail), so it needs an instruction-following
  # model. gpt-4o-mini over-compressed and ignored the preservation rules; use
  # gpt-4.1 (the same upgrade document_summarize got). 4096 tokens + 180s.
  # ---------------------------------------------------------------------------
  artifact_document_summary:
    provider: openai
    model: gpt-4.1
    timeout: 180
    temperature: 0.2
    max_tokens: 4096

  # ---------------------------------------------------------------------------
  # Artifact rollup: hierarchical clustered-merge of similar artifacts
  # (generate-artifacts --rollup). The merge is a STRICTLY LOSSLESS dedup --
  # every distinct fact/entity/number must survive, only exact-duplicate
  # restatements collapse -- which weaker models violate. gpt-4.1 required.
  # json_object output: {"text": ..., "confidence": ...}.
  # ---------------------------------------------------------------------------
  # Hierarchical clustered-rollup consolidation + lossless evaluate->revise loop.
  # Groq equivalent for all three: llama-3.3-70b-versatile. max_tokens 8192 on
  # merge/revise gives room to avoid over-compression.
  artifact_merge:
    provider: openai
    model: gpt-4.1
    timeout: 180
    temperature: 0.2
    max_tokens: 8192
    response_format: json_object
  artifact_merge_evaluate:
    provider: openai
    model: gpt-4.1
    timeout: 120
    temperature: 0.0
    max_tokens: 4096
    response_format: json_object
  artifact_merge_revise:
    provider: openai
    model: gpt-4.1
    timeout: 180
    temperature: 0.2
    max_tokens: 8192
    response_format: json_object

  # ---------------------------------------------------------------------------
  # Phase 2a: extract a single nested/complex table from a cropped PNG of a
  # PDF page region. Vision input; JSON-object output that conforms to the
  # StructuredTable JSON-LD schema. Only invoked when pdfplumber's flat
  # extraction is rejected as low-confidence (merged cells / multi-row
  # headers / sub-tables). gpt-4o-mini vision suffices: tables are small,
  # the schema is fixed, no synthesis is required.
  # ---------------------------------------------------------------------------
  table_extract_vision:
    provider: openai
    model: gpt-4o-mini
    timeout: 90
    temperature: 0.0
    max_tokens: 4096
    response_format: json_object

  # ---------------------------------------------------------------------------
  # Phase 2a follow-up: per-extracted-table classification into the 6 anchor
  # buckets in domain_concepts (FinancialTable / FinancialObservation / Metric
  # / Dimension / Measure / TimePeriod). Runs ONCE per table during
  # prune-expand --tables, cached by table sha256 so reruns are free. Cheap
  # text-only call.
  # ---------------------------------------------------------------------------
  table_concept_grouping:
    provider: openai
    model: gpt-4o-mini
    timeout: 60
    temperature: 0.0
    max_tokens: 2048
    response_format: json_object

# =============================================================================
# Retry / backoff defaults (applied by the router via tenacity unless overridden
# at the task level above).
# =============================================================================
defaults:
  retries:
    max_attempts: 5
    initial_wait_seconds: 1
    max_wait_seconds: 30
    # Retry only transient errors. Auth/4xx other than 429 fail fast.
    retry_on_status: [429, 500, 502, 503, 504]
