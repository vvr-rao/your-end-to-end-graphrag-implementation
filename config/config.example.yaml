# =============================================================================
# config.example.yaml
#
# Copy to config.yaml and edit. config.yaml is gitignored.
#   cp config/config.example.yaml config/config.yaml
#
# Loaded by backend/app/core/config.py via pydantic-settings on startup.
# All paths are relative to the repo root unless absolute.
# =============================================================================

# -----------------------------------------------------------------------------
# Document chunking (tiktoken-based, paragraph-first exact-token packing —
# matches kg_populationv5.ipynb behavior).
# -----------------------------------------------------------------------------
chunking:
  # Target chunk size in tokens (o200k_base encoding). gpt-4.1 handles
  # 2K-token chunks comfortably; the ontology-slice overhead amortizes
  # over fewer Stage-2 calls.
  chunk_size: 2000
  # Overlap between adjacent chunks; helps preserve context across splits.
  chunk_overlap: 150
  # Documents above this many tokens are pre-summarized via gpt-4o-mini
  # before chunking. The summary preserves entities, relationships,
  # conceptual buckets, and proper nouns -- discards repetitive prose.
  # Cuts Stage 2 cost dramatically on corpora dominated by a few large
  # documents. Set to 0 to disable; the pipeline then chunks raw text.
  summarization_threshold_tokens: 2000
  # Persistent disk cache for document summaries at
  # ~/.cache/your-personal-knowledge-graph-creator/doc_summaries/. Cache
  # key hashes the doc text + model + prompt version, so editing a doc
  # or changing the model invalidates that entry automatically. Re-runs
  # against unchanged docs cost nothing for summarization. Set to false
  # to force every run to re-call the LLM (debugging only).
  use_summary_cache: true
  # Single-call ceiling for summarization. Docs above this many tokens
  # trigger HIERARCHICAL summarization: the doc is split into sub-chunks
  # of `oversize_doc_sub_chunk_tokens` each, each sub-chunk is summarized
  # via gpt-4o-mini independently, and the per-sub-chunk summaries are
  # concatenated into the final combined summary. Default 100K = below
  # gpt-4o-mini's 128K context window with headroom for the prompt
  # template. Docs at/under this size use a single LLM call (cheaper).
  max_doc_input_tokens: 100000
  # Sub-chunk size used when a doc exceeds max_doc_input_tokens and
  # falls into the hierarchical-summarization path. Each sub-chunk gets
  # its own gpt-4o-mini call. 80K keeps each sub-call comfortably under
  # the 128K context limit; raise if you want fewer sub-chunks per doc
  # (slightly more compression risk).
  oversize_doc_sub_chunk_tokens: 80000
  # Number of documents loaded into memory per batch during the
  # streaming summarize -> chunk pass. 16 keeps peak memory low on tight
  # RAM budgets (~50 MB on a 2.7 GiB box); raise on machines with more
  # RAM for slightly faster runs. Set to 0 to fall back to "load
  # everything at once" (legacy behavior; will OOM on large corpora).
  streaming_batch_size: 16
  # tiktoken encoding name. o200k_base matches GPT-4o family + recent embedding models.
  encoding: o200k_base

# -----------------------------------------------------------------------------
# Embeddings — provider/model lives in models.yaml; these are runtime params.
# -----------------------------------------------------------------------------
embeddings:
  # Number of texts to send per OpenAI batch call. 100 is a safe default.
  batch_size: 100
  # If true, embed at upload time; else require explicit job trigger.
  embed_on_ingest: true

# -----------------------------------------------------------------------------
# Ontology storage paths (folders already exist with notes.md tracked;
# subdirectories of these folders are gitignored).
# -----------------------------------------------------------------------------
ontology:
  # Drop user-provided .owl source files anywhere under this folder.
  source_dir: ./source_ontologies
  # Generated/exported .owl files land here. Real version control = Postgres `ontology_versions`.
  output_dir: ./output_ontologies
  # Default base IRI for synthetically created classes from "MATCH NOT FOUND" LLM output.
  default_base_iri: http://your-personal-ontologist.local/ontology/
  # Default parent IRI for proposed-but-unparented classes.
  default_parent_iri: http://www.w3.org/2002/07/owl#Thing
  # IRI prefixes that prune will NEVER remove. Any class whose IRI starts with
  # one of these prefixes is force-included in the prune keep-set regardless
  # of whether the document corpus surfaced it. Use this to preserve your own
  # curated ontologies across prune / prune-expand / build runs.
  # Property survival follows automatically: any object/data property whose
  # domain or range touches a protected class also survives.
  protected_iri_prefixes: []
  # Example (uncomment and edit):
  # protected_iri_prefixes:
  #   - https://your-domain.example.com/ontology/your-curated-ontology
  #   # FOAF (foaf:Person, foaf:Organization, foaf:Agent, foaf:Group)
  #   - http://xmlns.com/foaf/0.1/
  #   # W3C Organization Ontology (org:Organization, org:Role, org:Membership)
  #   - http://www.w3.org/ns/org#

# -----------------------------------------------------------------------------
# LLM expansion run parameters.
# -----------------------------------------------------------------------------
expansion:
  # How many ontology classes to send per LLM batch (matches notebook's split_dict_by_size).
  ontology_chunk_size: 50
  # Concurrency cap for LLM calls inside a run (respects provider rate limits).
  max_concurrent_llm_calls: 8
  # Hard cost ceiling per run in USD; run aborts if estimated cost exceeds this.
  max_cost_usd: 25.00
  # Default hops for class-graph expansion in pruning step.
  prune_max_hops: 1

# -----------------------------------------------------------------------------
# RAG QA defaults (Phase 2).
# -----------------------------------------------------------------------------
qa:
  # Top-k candidate classes from class-summary ANN.
  k_classes: 15
  # Top-k chunks after graph-aware filtering.
  k_chunks: 20
  # Hops over class_relationships for graph expansion (0 = no expansion).
  hops: 1

# -----------------------------------------------------------------------------
# Background jobs (arq).
# -----------------------------------------------------------------------------
jobs:
  # Max concurrent arq jobs per worker.
  max_jobs: 8
  # Per-job timeout (seconds).
  job_timeout: 3600
  # Max retries on transient failures (LLM 429/5xx are retried inside the router; this is for whole-job retries).
  max_tries: 3

# -----------------------------------------------------------------------------
# Storage backend (raw uploaded files — Phase 3 may swap local→S3/R2).
# -----------------------------------------------------------------------------
storage:
  backend: local   # local | s3 (Phase 3+)
  # Override via STORAGE_DIR env var.
