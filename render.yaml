# =============================================================================
# render.yaml — Render Blueprint for your-end-to-end-graphrag-implementation
#
# Services:
#   - backend  : FastAPI + MCP (Streamable HTTP) — single uvicorn process at /mcp + REST
#   - worker   : arq background worker (Phase 1+; autoDeploy disabled until WorkerSettings lands)
#   - frontend : static React + Vite UI
#
# Postgres is intentionally external (Supabase) — paste your connection string
# into the `DATABASE_URL` env var of the backend + worker services. The app
# auto-normalizes the scheme to asyncpg and appends ?ssl=require for *.supabase.co.
#
# Plan = free everywhere. Free-tier limits to be aware of:
#   - backend web sleeps after 15 min idle (first request after sleep: 30-60s).
#   - no persistent disk (STORAGE_DIR is unused in Phase 3; uploads not supported).
#   - Redis service is NOT declared (Render no longer offers free Redis; re-add
#     when the arq worker actually ships and we move to a paid plan).
#   - 750 hr/month per account; one always-on backend uses ~720 hr.
# =============================================================================

services:
  - type: web
    name: backend
    runtime: docker
    plan: free
    region: oregon
    rootDir: .
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false                          # paste Supabase DSN in dashboard
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: BEARER_TOKEN
        generateValue: true
      - key: FRONTEND_ORIGIN
        sync: false                          # CSV of allowed origins; e.g.
                                             # "http://localhost:5173,https://<frontend>.onrender.com"
      - key: LOG_LEVEL
        value: INFO
      - key: ENV
        value: production

  - type: worker
    name: worker
    runtime: docker
    plan: free
    region: oregon
    rootDir: .
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: uv run arq backend.app.jobs.worker.WorkerSettings
    autoDeploy: false                        # enable once the worker module ships
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false                          # set when Redis is provisioned
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: BEARER_TOKEN
        fromService:
          type: web
          name: backend
          envVarKey: BEARER_TOKEN
      - key: LOG_LEVEL
        value: INFO
      - key: ENV
        value: production

  - type: web
    name: frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false                          # set to the backend service URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
